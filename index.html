<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Gestión de Productos</title>
    
    <!-- Favicon y iconos -->
    <link rel="icon" type="image/svg+xml" href="./assets/logo.svg">
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <link rel="apple-touch-icon" href="./assets/logo.svg">
    
    <link rel="stylesheet" href="./librerías/tailwind.min.css">
    <script src="./librerías/sweetalert2@11.js"></script>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/mobile-components.css">
    <script src="./js/ui/theme-manager.js"></script>
    <script src="./js/ui/theme-toggle.js"></script>
    <link rel="manifest" href="./manifest.json">
</head>

<body class="bg-gray-100 dark-theme-body">
    <div class="container mx-auto mt-8 p-4">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold dark-theme-title">Iniciar Sesión</h1>
            <!-- Botón de alternar tema -->
            <button id="themeToggleBtn" class="p-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white transition-colors"
                title="Alternar tema">
                <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
                    </path>
                </svg>
            </button>
        </div>

        <form id="formLogin" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4 dark-theme-form">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2 dark-theme-label" for="email">
                    Email:
                </label>
                <input
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline dark-theme-input"
                    id="email" type="email" required>
                <small class="text-gray-500 mt-1 block" id="emailHint"></small>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2 dark-theme-label" for="password">
                    Contraseña:
                </label>
                <input
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline dark-theme-input"
                    id="password" type="password" required>
            </div>
            <div class="flex flex-col gap-3">
                <div class="flex items-center justify-between gap-2">
                    <button
                        class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline dark-theme-button flex-1"
                        type="submit">
                        Iniciar Sesión
                    </button>
                    <!-- Botón de huella biométrica -->
                    <button
                        id="biometricBtn"
                        class="bg-purple-500 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline dark-theme-button"
                        type="button"
                        title="Autenticarse con huella o reconocimiento facial"
                        style="display: none;">
                        🔐
                    </button>
                </div>
                <a href="./register.html" class="text-blue-500 hover:underline dark-theme-link text-sm">¿No tienes una cuenta? Regístrate</a>
            </div>
            <div class="mt-4 text-center">
                <a href="plantillas/request-password-reset.html"
                    class="inline-block align-baseline font-bold text-sm text-blue-500 hover:text-blue-800 dark-theme-link">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>
        </form>

        <div id="mensaje" class="mt-4 dark-theme-message"></div>
        <div id="bloqueoLogin" class="mt-4 hidden">
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative flex items-center justify-between">
                <span>
                    <strong>Demasiados intentos.</strong> Has sido bloqueado temporalmente.<br>
                    Espera <span id="temporizadorBloqueo">60</span> segundos para volver a intentar.
                </span>
            </div>
        </div>
    </div>

    <script src="./js/ui/mobile-optimizer.js"></script>
    <!-- Cargar Supabase como script tradicional antes de auth.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.40.0/dist/umd/supabase.js"></script>
    <script type="module" src="./js/auth/auth.js"></script>
    <script>
        // Registrar Service Worker de manera más robusta
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    // Detectar si estamos en localhost o en GitHub Pages
                    const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
                    const swPath = isLocalhost ? './service-worker.js' : '/GestorInventory-Frontend/service-worker.js';

                    const registration = await navigator.serviceWorker.register(swPath, {
                        scope: isLocalhost ? './' : '/GestorInventory-Frontend/'
                    });

                    console.log('✅ Service Worker registrado exitosamente');
                    console.log('📂 Scope:', registration.scope);

                    // Manejar actualizaciones del service worker
                    registration.addEventListener('updatefound', () => {
                        console.log('🔄 Nueva versión del Service Worker disponible');
                    });

                } catch (error) {
                    console.error('❌ Error registrando Service Worker:', error);
                }
            });
        } else {
            console.warn('⚠️ Service Workers no son compatibles con este navegador');
        }
    </script>
    <script type="module">
        import { sessionManager } from './js/auth/session-manager.js';
        
        // Auto-llenar email desde usuario recordado
        document.addEventListener('DOMContentLoaded', () => {
            const emailInput = document.getElementById('email');
            const emailHint = document.getElementById('emailHint');
            const biometricBtn = document.getElementById('biometricBtn');
            
            const rememberedUser = sessionManager.getRememberedUser();
            if (rememberedUser) {
                emailInput.value = rememberedUser;
                emailHint.textContent = `👤 Usuario recordado: ${rememberedUser}`;
                emailHint.className = 'text-gray-500 mt-1 block text-xs';
                
                // Mostrar botón de biometría si está disponible
                if (sessionManager.isBiometricAvailable()) {
                    biometricBtn.style.display = 'block';
                    biometricBtn.addEventListener('click', async (e) => {
                        e.preventDefault();
                        await autenticarConBiometria(rememberedUser);
                    });
                }
            }
        });

        // Función para autenticarse con biometría
        async function autenticarConBiometria(email) {
            const biometricBtn = document.getElementById('biometricBtn');
            biometricBtn.disabled = true;
            biometricBtn.textContent = '⏳';
            
            try {
                const success = await sessionManager.authenticateWithBiometric(email);
                if (success) {
                    // Si la biometría es exitosa, pedir contraseña
                    const { value: password } = await Swal.fire({
                        title: 'Contraseña requerida',
                        input: 'password',
                        inputLabel: 'Ingresa tu contraseña para completar el inicio de sesión',
                        inputPlaceholder: 'Contraseña',
                        showCancelButton: true,
                        confirmButtonText: 'Iniciar Sesión',
                        cancelButtonText: 'Cancelar',
                        inputAttributes: {
                            autocapitalize: 'off',
                            autocorrect: 'off'
                        }
                    });
                    
                    if (password) {
                        // Enviar al backend para validar
                        document.getElementById('email').value = email;
                        document.getElementById('password').value = password;
                        document.getElementById('formLogin').dispatchEvent(new Event('submit'));
                    }
                } else {
                    alert('Autenticación biométrica fallida o no disponible');
                }
            } catch (error) {
                console.error('Error en autenticación biométrica:', error);
                alert('Error en autenticación biométrica: ' + error.message);
            } finally {
                biometricBtn.disabled = false;
                biometricBtn.textContent = '🔐';
            }
        }

        // Exponer función globalmente para debug
        window.autenticarConBiometria = autenticarConBiometria;
    </script>
    <script>
    // Función para mostrar bloqueo y temporizador en login
    function mostrarBloqueoLogin(segundos = 60) {
        const bloqueoDiv = document.getElementById('bloqueoLogin');
        const temporizadorSpan = document.getElementById('temporizadorBloqueo');
        const btnLogin = document.querySelector('#formLogin button[type="submit"]');
        let tiempoRestante = segundos;
        bloqueoDiv.classList.remove('hidden');
        btnLogin.disabled = true;
        temporizadorSpan.textContent = tiempoRestante;
        const intervalo = setInterval(() => {
            tiempoRestante--;
            temporizadorSpan.textContent = tiempoRestante;
            if (tiempoRestante <= 0) {
                clearInterval(intervalo);
                bloqueoDiv.classList.add('hidden');
                btnLogin.disabled = false;
            }
        }, 1000);
    }
    </script>
    <!-- Sistema de versionado: verificador automático de actualizaciones -->
    <script src="./js/ui/version-checker.js"></script>

    <!-- Footer de versión -->
    <footer id="version-footer" style="position:fixed;bottom:0;left:0;width:100%;background:rgba(0,0,0,0.06);text-align:center;padding:3px 0;font-size:11px;color:#6b7280;z-index:100;pointer-events:none;">
      <span id="current-version">...</span>
    </footer>
    <script>
      fetch('./version.json?t=' + Date.now())
        .then(r => r.json())
        .then(d => { document.getElementById('current-version').textContent = 'v' + d.version; })
        .catch(() => {});
    </script>

    <script>
        // Forzar actualización del Service Worker y limpieza de cache
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                registrations.forEach(registration => {
                    console.log('Desregistrando Service Worker antiguo:', registration);
                    registration.unregister();
                });
            });
            
            // Limpiar caches
            caches.keys().then(cacheNames => {
                cacheNames.forEach(cacheName => {
                    console.log('Eliminando cache:', cacheName);
                    caches.delete(cacheName);
                });
            });
        }
    </script>
</body>

</html>
